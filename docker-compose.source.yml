services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: dewey778899/new-api:local
    container_name: new-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Shanghai
      GIN_MODE: release
      PORT: 3000
      SESSION_SECRET: change-this-session-secret
    volumes:
      - ./data:/data
